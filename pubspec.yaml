name: microlearning_app
description: "A context-aware adaptive microlearning mobile application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.12.4
  connectivity_plus: ^7.1.1
  sensors_plus: ^7.0.0
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.3.2
  share_plus: ^10.0.0
  video_player: ^2.9.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  chewie: ^1.8.5
  file_picker: ^8.1.2
  youtube_player_flutter: ^9.1.1
  webview_flutter: ^4.7.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env

